<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin - Thông Tin Trường Hàn</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <h1 class="login-title">Đăng nhập Admin</h1>
      <p class="login-subtitle">Nhập thông tin quản trị để tiếp tục</p>
    </div>

    <form class="login-form" id="admin-login-form">
      <div id="error-message" class="error-message"></div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="nhap email" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" placeholder="Mật khẩu" required autocomplete="current-password" minlength="4">
      </div>

      <div class="form-group" style="margin-top:0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.85rem; font-weight:400; color:#64748b;">
          <input type="checkbox" name="remember" style="width:18px; height:18px; accent-color:#2563eb;">
          <span>Ghi nhớ đăng nhập</span>
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i> Đăng nhập
        </button>
      </div>
    </form>

    <div class="footer-links">
      <a href="/" onclick="event.preventDefault(); window.location.href='/'">← Về trang chủ</a>
      <span style="margin:0 1rem; color:#94a3b8;">|</span>
      <a href="/admin/login-private" onclick="event.preventDefault(); window.location.href='/admin/login-private'">Mật khẩu Private Access</a>
    </div>

    <div class="brand">
      <i class="fas fa-lock"></i>
      <span>Thông Tin Trường Hàn - Admin Panel</span>
    </div>
  </div>
</div>

<script>
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const email = form.email.value.trim();
  const password = form.password.value;
  const remember = form.remember?.checked;
  const errorEl = document.getElementById('error-message');

  errorEl.textContent = '';
  errorEl.classList.remove('show');

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, remember })
    });

    const data = await res.json();

    if (res.ok) {
      window.location.href = '/admin/dashboard.html';
    } else {
      throw new Error(data.error || 'Đăng nhập thất bại');
    }
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập';
  }
});

// Auto-focus
document.getElementById('email').focus();
</script>
</body>
</html>
