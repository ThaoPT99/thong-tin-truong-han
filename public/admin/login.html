<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Access - Thông Tin Trường Hàn</title>
<link rel="stylesheet" href="admin.css">
<style>
  .login-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; background:linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); }
  .login-box { background:#fff; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 10px 40px rgba(30,58,95,0.15); }
  .login-header { text-align:center; margin-bottom:2rem; }
  .login-icon { width:64px; height:64px; margin:0 auto 1rem; background:linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); border-radius:16px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.5rem; }
  .login-title { font-size:1.5rem; font-weight:700; color:#1e3a5f; margin-bottom:0.5rem; }
  .login-subtitle { color:#64748b; font-size:0.95rem; }
  .login-form { display:grid; gap:1.25rem; }
  .form-group { display:grid; gap:0.5rem; }
  .form-group label { font-size:0.85rem; font-weight:600; color:#475569; }
  .form-group input { padding:0.875rem 1rem; border:1px solid #dbe3ee; border-radius:10px; font:inherit; font-size:1rem; transition:border-color .15s, box-shadow .15s; }
  .form-group input:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.15); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .form-actions { display:flex; gap:0.75rem; margin-top:0.5rem; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; padding:0.875rem 1.5rem; border-radius:10px; font:inherit; font-weight:600; cursor:pointer; transition:all .15s; border:none; text-decoration:none; white-space:nowrap; }
  .btn-primary { background:#1e3a5f; color:#fff; flex:1; }
  .btn-primary:hover { background:#16304c; }
  .btn-secondary { background:#fff; border:1px solid #dbe3ee; color:#475569; flex:1; }
  .btn-secondary:hover { background:#eef2f7; border-color:#c4d6e8; }
  .error-message { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; padding:0.875rem 1rem; border-radius:10px; font-size:0.85rem; display:none; }
  .error-message.show { display:block; }
  .footer-links { margin-top:1.5rem; text-align:center; font-size:0.85rem; color:#64748b; }
  .footer-links a { color:#2563eb; text-decoration:none; font-weight:500; }
  .footer-links a:hover { text-decoration:underline; }
  .brand { margin-top:2rem; text-align:center; color:#94a3b8; font-size:0.8rem; }
  .brand svg { width:24px; height:24px; margin-bottom:0.25rem; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      </div>
      <h1 class="login-title">Private Access</h1>
      <p class="login-subtitle">Sản phẩm riêng tư - Cần xác thực để truy cập</p>
    </div>

    <form class="login-form" id="login-form" method="POST">
      <div id="error-message" class="error-message"></div>
      
      <div class="form-group">
        <label for="password">Mật khẩu truy cập</label>
        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu truy cập" required autocomplete="current-password" minlength="4">
      </div>

      <div class="form-row">
        <button type="submit" class="btn btn-primary">🔓 Truy cập</button>
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">← Quay lại</button>
      </div>

      <div class="form-group" style="margin-top:0.5rem;">
        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.85rem; font-weight:400; color:#64748b;">
          <input type="checkbox" name="remember" style="width:18px; height:18px; accent-color:#2563eb;">
          <span>Ghi nhớ 30 ngày</span>
        </label>
      </div>
    </form>

    <div class="footer-links">
      <a href="/" onclick="event.preventDefault(); window.location.href='/'">← Về trang chủ</a>
    </div>

    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
      <span>Thông Tin Trường Hàn - Private Product</span>
    </div>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const password = form.password.value;
  const remember = form.remember?.checked;
  const errorEl = document.getElementById('error-message');

  errorEl.textContent = '';
  errorEl.classList.remove('show');

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Đang xác thực...';

  try {
    const res = await fetch('/api/auth/verify-access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, remember })
    });

    const data = await res.json();

    if (res.ok) {
      window.location.href = new URLSearchParams(window.location.search).get('redirect') || '/';
    } else {
      throw new Error(data.error || 'Mật khẩu không đúng');
    }
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🔓 Truy cập';
  }
});

// Auto-focus
document.getElementById('password').focus();
</script>
</body>
</html>
