<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Admin Thông Tin Trường Hàn</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
<div class="login-card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 4L6 14v20l18 10 18-10V14L24 4z"/>
      <path d="M24 4v40"/>
      <path d="M6 14l18 10 18-10"/>
    </svg>
  </div>
  <h1>Quản lý Trường Hàn</h1>
  <p class="subtitle">Đăng nhập để quản lý dữ liệu trường</p>
  <div class="login-error" id="login-error"></div>
  <form id="login-form" autocomplete="off">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@thongtintruonghan.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
      Đăng nhập
    </button>
  </form>
</div>

<script src="admin.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Đang đăng nhập...';

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Đăng nhập thất bại');
    }

    setToken(data.token);
    setUser(data.user);
    window.location.href = 'dashboard.html';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Đăng nhập';
  }
});
</script>
</body>
</html>
