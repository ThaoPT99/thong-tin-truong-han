<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cẩm nang Tuyển sinh Du học Hàn Quốc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT & RESET
   ═══════════════════════════════════════ */
:root {
  --primary: #1e3a5f;
  --primary-light: #2d5a87;
  --accent: #0f766e;
  --gold: #d97706;
  --red: #dc2626;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --bg-light: #f8fafc;
  --font: 'Be Vietnam Pro', 'Segoe UI', system-ui, sans-serif;
  --font-kr: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  color: var(--text);
  line-height: 1.7;
  background: #fff;
  font-size: 10.5pt;
}

/* ═══════════════════════════════════════
   SCREEN STYLES
   ═══════════════════════════════════════ */
.book-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
}

.loading-screen {
  text-align: center;
  padding: 60px 20px;
  font-size: 1.1rem;
  color: var(--text-muted);
}

.loading-screen .spinner {
  display: inline-block;
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-screen {
  text-align: center;
  padding: 60px 20px;
  color: var(--red);
}

.print-toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--primary);
  color: #fff;
  font-size: 0.9rem;
  flex-wrap: wrap;
}

.print-toolbar button {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  background: #fff;
  color: var(--primary);
  font-weight: 700;
  cursor: pointer;
  font-size: 0.9rem;
}
.print-toolbar button:hover { background: #e2e8f0; }
.print-toolbar .toolbar-hint {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.7);
}

/* ═══════════════════════════════════════
   COVER PAGE
   ═══════════════════════════════════════ */
.cover-page {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  background: linear-gradient(135deg, #0c1f33 0%, #1a5276 45%, #0f766e 100%);
  color: #fff;
  padding: 60px 40px;
  position: relative;
  overflow: hidden;
}

.cover-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 60%, rgba(45, 212, 191, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 30%, rgba(96, 165, 250, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(251, 191, 36, 0.06) 0%, transparent 50%);
}

.cover-page::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image:
    radial-gradient(circle at 20px 20px, #fff 1px, transparent 1px),
    radial-gradient(circle at 60px 120px, #fff 1px, transparent 1px),
    radial-gradient(circle at 120px 40px, #fff 1px, transparent 1px),
    radial-gradient(circle at 200px 80px, #fff 1px, transparent 1px);
  background-size: 200px 200px;
}

.cover-page > * { position: relative; z-index: 1; }

.cover-badge {
  display: inline-block;
  padding: 4px 16px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  font-size: 0.72rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.cover-page h1 {
  font-size: 2.6rem;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 6px;
  letter-spacing: -0.03em;
}

.cover-page .cover-sub {
  font-size: 1rem;
  color: rgba(255,255,255,0.8);
  margin-bottom: 0;
  max-width: 600px;
  line-height: 1.6;
}

.cover-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0;
}

.cover-divider .line {
  width: 60px;
  height: 2px;
  background: rgba(255,255,255,0.2);
}

.cover-divider .diamond {
  width: 8px;
  height: 8px;
  background: #2dd4bf;
  transform: rotate(45deg);
}

.cover-meta {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.7);
  line-height: 2;
}
.cover-meta strong { color: #fff; font-weight: 700; }

.cover-footer {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
}

/* ═══════════════════════════════════════
   TABLE OF CONTENTS
   ═══════════════════════════════════════ */
.toc-page {
  page-break-before: always;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
}

.toc-page h2 {
  font-size: 1.6rem;
  color: var(--primary);
  margin-bottom: 28px;
  padding-bottom: 10px;
  border-bottom: 3px solid var(--primary);
}

.toc-list { list-style: none; counter-reset: toc-counter; }

.toc-list > li {
  counter-increment: toc-counter;
  padding: 8px 0;
  border-bottom: 1px dotted var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.toc-list > li::before {
  content: "0" counter(toc-counter);
  font-weight: 800;
  color: var(--primary);
  font-size: 0.85rem;
  margin-right: 10px;
  width: 28px;
  opacity: 0.6;
}

.toc-list > li a {
  color: var(--text);
  text-decoration: none;
  flex: 1;
  padding: 4px 0;
  font-weight: 500;
}
.toc-list > li a:hover { color: var(--primary); }

.toc-list .toc-page-num {
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 600;
}

.toc-note {
  margin-top: 32px;
  padding: 14px 16px;
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
  text-align: center;
}

/* ═══════════════════════════════════════
   SECTION HERO IMAGE BANNER
   ═══════════════════════════════════════ */
.section-hero {
  width: 100%;
  height: 140px;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 20px;
  position: relative;
}

.section-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.section-hero .hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(30,58,95,0.7) 0%, rgba(30,58,95,0.3) 100%);
}

/* ═══════════════════════════════════════
   SECTION PAGES (Part 1 - Overview)
   ═══════════════════════════════════════ */
.section-page {
  page-break-before: always;
  padding: 32px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.section-header {
  margin-bottom: 20px;
}

.section-header .section-num {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 4px;
}

.section-header h2 {
  font-size: 1.5rem;
  color: var(--primary);
  line-height: 1.3;
  font-weight: 800;
}

.section-header .section-divider {
  width: 50px;
  height: 3px;
  background: var(--gold);
  border-radius: 2px;
  margin-top: 10px;
}

.section-body {
  flex: 1;
}

.section-body > p:first-child {
  margin-bottom: 14px;
  text-align: justify;
  font-size: 0.95rem;
}

.section-body p {
  margin-bottom: 10px;
  text-align: justify;
}

.section-body ul, .section-body ol {
  margin: 6px 0 14px 20px;
}
.section-body li { margin-bottom: 5px; }

/* Highlight cards */
.info-card {
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-light);
  margin-bottom: 10px;
  page-break-inside: avoid;
}

.info-card h3 {
  font-size: 0.93rem;
  color: var(--primary);
  margin-bottom: 5px;
}

.info-card p {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin: 0;
  text-align: left;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 12px 0;
}

.info-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 12px 0;
}

.info-grid-1 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin: 12px 0;
}

.warning-box {
  padding: 12px 16px;
  border-left: 4px solid var(--gold);
  background: #fffbeb;
  border-radius: 4px;
  margin: 14px 0;
  font-size: 0.88rem;
  page-break-inside: avoid;
}

.warning-box strong {
  color: var(--gold);
}

.tip-box {
  padding: 12px 16px;
  border-left: 4px solid var(--accent);
  background: #f0fdfa;
  border-radius: 4px;
  margin: 14px 0;
  font-size: 0.88rem;
  page-break-inside: avoid;
}

.tip-box strong {
  color: var(--accent);
}

.step-list {
  counter-reset: step;
  list-style: none;
  padding: 0;
}

.step-list li {
  counter-increment: step;
  padding: 10px 14px 10px 44px;
  position: relative;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  background: #fff;
  page-break-inside: avoid;
}

.step-list li::before {
  content: counter(step);
  position: absolute;
  left: 11px;
  top: 11px;
  width: 24px;
  height: 24px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
}

.step-list li strong {
  display: block;
  color: var(--primary);
  font-size: 0.9rem;
}

.step-list li span {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ═══════════════════════════════════════
   ROUTE TIMELINE (D2-6 → D2-1/2 → D10 → E7)
   ═══════════════════════════════════════ */
.route-timeline {
  display: flex;
  align-items: stretch;
  gap: 0;
  margin: 16px 0;
  page-break-inside: avoid;
}

.route-step {
  flex: 1;
  padding: 14px 10px;
  text-align: center;
  position: relative;
}

.route-step .route-icon {
  font-size: 1.6rem;
  margin-bottom: 4px;
  display: block;
}

.route-step .route-label {
  font-weight: 800;
  font-size: 0.9rem;
  display: block;
  margin-bottom: 2px;
}

.route-step .route-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  display: block;
  line-height: 1.4;
}

.route-step .route-arrow {
  position: absolute;
  right: -12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: var(--text-muted);
  z-index: 2;
}

.route-step-1 { background: #dbeafe; border-radius: 8px 0 0 8px; }
.route-step-1 .route-label { color: #1d4ed8; }
.route-step-2 { background: #e0f2fe; }
.route-step-2 .route-label { color: #0369a1; }
.route-step-3 { background: #ccfbf1; }
.route-step-3 .route-label { color: #0f766e; }
.route-step-4 { background: #fef3c7; border-radius: 0 8px 8px 0; }
.route-step-4 .route-label { color: #b45309; }

/* ═══════════════════════════════════════
   SCHOOL DIRECTORY (Part 2)
   ═══════════════════════════════════════ */
.school-page {
  page-break-before: always;
  padding: 28px 36px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.school-header-strip {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.school-header-strip .school-num {
  width: 44px;
  height: 44px;
  background: var(--primary);
  color: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.school-header-strip .school-title-group {
  flex: 1;
}

.school-header-strip h2 {
  font-size: 1.2rem;
  color: var(--primary);
  line-height: 1.2;
  margin: 0;
}

.school-header-strip .name-kr {
  font-family: var(--font-kr);
  font-size: 0.9rem;
  color: var(--text-muted);
}

.school-header-strip .name-en {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.school-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  flex-shrink: 0;
}

.school-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-system {
  background: #dbeafe;
  color: #1d4ed8;
}

.badge-region {
  background: #d1fae5;
  color: #065f46;
}

.badge-quota {
  background: #fef3c7;
  color: #92400e;
}

.school-meta-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.school-meta-tag {
  padding: 2px 8px;
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: nowrap;
}

.school-meta-tag strong { color: var(--primary); }

.school-intro-box {
  padding: 10px 14px;
  background: #f0f4ff;
  border-radius: 6px;
  margin-bottom: 12px;
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--text);
  text-align: justify;
  border: 1px solid #dbeafe;
}

.school-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-content: start;
}

.school-body .full-width {
  grid-column: 1 / -1;
}

.school-card {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-light);
  page-break-inside: avoid;
}

.school-card h3 {
  font-size: 0.8rem;
  color: var(--primary);
  margin-bottom: 4px;
  padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.school-card p, .school-card div {
  font-size: 0.82rem;
  line-height: 1.55;
  color: var(--text);
}

.school-card ul {
  margin: 3px 0 0 14px;
  font-size: 0.82rem;
}

.school-card li {
  margin-bottom: 2px;
  line-height: 1.45;
}

.school-card .muted {
  color: var(--text-muted);
  font-style: italic;
  font-size: 0.8rem;
}

.partner-tag {
  display: inline-block;
  padding: 2px 7px;
  margin: 2px 2px;
  background: #eaf2ff;
  color: #1d4ed8;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 600;
}

/* ═══════════════════════════════════════
   COMPARISON SECTION (Part 3)
   ═══════════════════════════════════════ */
.comparison-page {
  page-break-before: always;
  padding: 32px 36px;
  min-height: 100vh;
}

.comparison-page h2 {
  font-size: 1.3rem;
  color: var(--primary);
  margin-bottom: 14px;
}

.compact-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
  margin-bottom: 16px;
}

.compact-table th {
  background: var(--primary);
  color: #fff;
  padding: 6px 7px;
  text-align: left;
  font-weight: 600;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.compact-table td {
  padding: 4px 7px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.compact-table tr:nth-child(even) td {
  background: var(--bg-light);
}

.compact-table .region-seoul { border-left: 3px solid #2563eb; }
.compact-table .region-near-seoul,
.compact-table .region-gyeonggi,
.compact-table .region-incheon { border-left: 3px solid #0f766e; }
.compact-table .region-busan { border-left: 3px solid #d97706; }
.compact-table .region-gwangju { border-left: 3px solid #7c3aed; }
.compact-table .region-province { border-left: 3px solid #64748b; }
.compact-table .region-chungcheong,
.compact-table .region-chungcheongbuk,
.compact-table .region-chungcheongnam { border-left: 3px solid #0891b2; }
.compact-table .region-gyeongsang,
.compact-table .region-gyeongsangnam,
.compact-table .region-gyeongsangbuk { border-left: 3px solid #be123c; }
.compact-table .region-gangwon { border-left: 3px solid #15803d; }
.compact-table .region-jeolla,
.compact-table .region-jeollanam,
.compact-table .region-jeollabuk { border-left: 3px solid #a21caf; }

.table-note {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 8px;
}

/* ═══════════════════════════════════════
   APPENDIX
   ═══════════════════════════════════════ */
.appendix-page {
  page-break-before: always;
  padding: 36px 40px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.appendix-page h2 {
  font-size: 1.3rem;
  color: var(--primary);
  margin-bottom: 14px;
}

.appendix-body { flex: 1; }

.appendix-card {
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-light);
  margin-bottom: 14px;
  page-break-inside: avoid;
}

.appendix-card h3 {
  font-size: 0.95rem;
  color: var(--primary);
  margin-bottom: 6px;
}

.appendix-card p {
  font-size: 0.9rem;
  color: var(--text-muted);
}

.appendix-card a {
  color: var(--primary);
  font-weight: 700;
  text-decoration: none;
}

/* ═══════════════════════════════════════
   PRINT STYLES (A4)
   ═══════════════════════════════════════ */
@media print {
  @page {
    size: A4;
    margin: 1.6cm 1.8cm 1.8cm;
  }
  @page :first { margin: 0; }

  body {
    font-size: 9.5pt;
    background: #fff;
    color: #000;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .print-toolbar { display: none !important; }
  .loading-screen { display: none !important; }
  .error-screen { display: none !important; }

  .book-container {
    max-width: none;
    padding: 0;
    margin: 0;
  }

  .cover-page {
    height: 100vh;
    min-height: 100vh;
    padding: 50px 40px;
  }
  .cover-page::before,
  .cover-page::after { display: none; }

  .toc-page,
  .section-page,
  .school-page,
  .comparison-page,
  .appendix-page {
    padding: 0;
    page-break-before: always;
  }

  .toc-page { min-height: 100vh; }

  .section-hero {
    height: 110px;
    margin-bottom: 16px;
  }

  .section-page { min-height: 100vh; }
  .school-page { min-height: 100vh; }

  .school-body {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .info-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .info-grid-3 { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .info-grid-1 { gap: 8px; }

  .route-timeline { margin: 12px 0; }
  .route-step { padding: 10px 8px; }
  .route-step .route-icon { font-size: 1.3rem; }
  .route-step .route-label { font-size: 0.82rem; }
  .route-step .route-desc { font-size: 0.7rem; }

  .info-card, .school-card, .step-list li, .compact-table tr,
  .route-timeline, .warning-box, .tip-box {
    page-break-inside: avoid;
  }

  a { color: var(--primary); text-decoration: none; }

  .compact-table th {
    background: #1e3a5f !important;
    color: #fff !important;
  }
  .compact-table tr:nth-child(even) td { background: #f8fafc !important; }

  .section-header .section-divider { background: #d97706 !important; }
  .warning-box { border-left-color: #d97706 !important; background: #fffbeb !important; }

  .school-header-strip .school-num { background: #1e3a5f !important; }

// ══════════════════════════════════════════════════════════

(function main() {
  var LOADING_TIMEOUT = 15000;

  const API_BASE = 'https://thongtintruonghan.vercel.app/api';

  // ─── Unsplash images for sections ───

  (async function() {
  try {
    const schoolsRes = await fetch(API_BASE + '/schools?_=' + Date.now());
    if (!schoolsRes.ok) throw new Error('API error: ' + schoolsRes.status);

    const schoolsJson = await schoolsRes.json();
    const rawSchools = schoolsJson.data || [];

    // Transform schools
    const schools = rawSchools.map(function(s) {
      return {
        id: s.slug || s.id,
        name: s.name || '',
        nameKr: s.name_kr || '',
        nameEn: s.name_en || '',
        system: s.system || '',
        quota: s.quota || 0,
        region: s.region || '',
        location: s.location || '',
        intro: s.intro || '',
        tuition: s.tuition || '',
        ktx: s.ktx || '',
        insurance: s.insurance || '',
        schedule: s.schedule || '',
        website: s.website || '',
        catalogUrl: s.catalog_url || '',
        videoUrl: s.video_url || '',
        conditions: (s.conditions || []).map(function(c) { return typeof c === 'string' ? c : c.text || ''; }).filter(Boolean),
        majors: (s.majors || []).map(function(m) { return typeof m === 'string' ? m : m.text || ''; }).filter(Boolean),
        advantages: (s.advantages || []).map(function(a) { return typeof a === 'string' ? a : a.text || ''; }).filter(Boolean),
        conversion: (s.conversion || []).map(function(c) { return typeof c === 'string' ? c : c.text || ''; }).filter(Boolean),
        documents: (s.documents || []).map(function(d) { return typeof d === 'string' ? d : d.text || ''; }).filter(Boolean),
        partners: (s.partners || []).map(function(p) { return { code: p.code || '', name: p.name || '' }; }),
        mou: s.mou || '',
        advisor: s.advisorProfile || null,
      };
    });

    const kyName = 'Kỳ tháng ' + SEMESTER_INFO.ky + '/' + SEMESTER_INFO.nam;

    // Region labels
    const REGION_LABELS = {
      seoul: 'Seoul', 'near-seoul': 'Gần Seoul', busan: 'Busan',
      gwangju: 'Gwangju', province: 'Tỉnh khác', incheon: 'Incheon',
      gyeonggi: 'Gyeonggi', chungcheongbuk: 'Chungcheongbuk',
      chungcheongnam: 'Chungcheongnam', jeollanam: 'Jeollanam',
      jeollabuk: 'Jeollabuk', gyeongsangnam: 'Gyeongsangnam',
      gyeongsangbuk: 'Gyeongsangbuk', gangwon: 'Gangwon',
      daegu: 'Daegu', daejeon: 'Daejeon', ulsan: 'Ulsan', sejong: 'Sejong', jeju: 'Jeju',
    };

    function getRegionLabel(r) { return REGION_LABELS[r] || r || 'Đang cập nhật'; }

    function getRegionClass(r) {
      if (!r) return '';
      if (r === 'seoul' || r === 'near-seoul' || r === 'incheon' || r === 'gyeonggi') return 'region-' + r;
      if (r === 'busan' || r === 'gwangju') return 'region-' + r;
      if (r.indexOf('chungcheong') !== -1) return 'region-chungcheong';
      if (r.indexOf('gyeongsang') !== -1) return 'region-gyeongsang';
      if (r.indexOf('jeolla') !== -1) return 'region-jeolla';
      if (r === 'gangwon' || r === 'daegu' || r === 'daejeon' || r === 'ulsan' || r === 'sejong' || r === 'jeju') return 'region-province';
      return 'region-province';
    }

    function esc(s) {
      if (s === null || s === undefined) return '';
      var d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;

    function renderList(items, emptyText) {
      if (!items || items.length === 0) return '<span class="muted">' + (emptyText || 'Đang cập nhật') + '</span>';
      return '<ul>' + items.map(function(i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>';

    function renderPartnerTags(school) {
      var seen = {};
      var tags = [];
      if (school.mou) {

    // Render each school
    var regionOrder = ['seoul', 'near-seoul', 'incheon', 'gyeonggi', 'busan', 'gwangju', 'chungcheongbuk', 'chungcheongnam', 'jeollanam', 'jeollabuk', 'gyeongsangnam', 'gyeongsangbuk', 'gangwon', 'province'];

      if (bi === -1) bi = 99;
      if (ai !== bi) return ai - bi;
      return (a.name || '').localeCompare(b.name || '', 'vi');
    });

    sortedSchools.forEach(function(s, idx) {
      var hasEnoughContent = (s.conditions && s.conditions.length >= 3) || (s.majors && s.majors.length >= 5) || (s.advantages && s.advantages.length >= 3);

      html += '<div class="school-page">';

      html += '</div>';

      if (s.tuition) html += '<span class="school-meta-tag"><strong>💰</strong> ' + esc(s.tuition.replace(/\\n/g, ' ').substring(0, 45)) + '</span>';
