<svg width="400" height="140" viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background card -->
  <rect width="400" height="140" rx="32" fill="#08223F"/>

  <!-- Icon: Document with compass needle -->
  <g transform="translate(24,20)">
    <!-- Document body -->
    <rect x="4" y="4" width="72" height="92" rx="12" fill="url(#docBg)" stroke="url(#docBorder)" stroke-width="2"/>
    <!-- Folded corner -->
    <path d="M52 4V24C52 28.4 55.6 32 60 32H76" fill="url(#foldGrad)" stroke="#20E3B2" stroke-width="1.5"/>
    <!-- Content lines (simulating text on document) -->
    <rect x="16" y="38" width="48" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="16" y="48" width="40" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="16" y="58" width="44" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="16" y="68" width="32" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
    <!-- Compass/star -->
    <path d="M40 14L43.5 22.5L52 24.5L46 30.5L47.5 39L40 35L32.5 39L34 30.5L28 24.5L36.5 22.5L40 14Z" fill="#FBBF24"/>
    <!-- Check mark -->
    <path d="M28 80L36 88L52 72" stroke="#20E3B2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: D26 -->
  <text x="130" y="46" fill="white" font-family="'Be Vietnam Pro', Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="-1">D26</text>

  <!-- Tagline -->
  <text x="130" y="76" fill="#99F6E4" font-family="'Be Vietnam Pro', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1">HỒ SƠ DU HỌC</text>

  <!-- Subtitle -->
  <rect x="128" y="88" width="164" height="28" rx="14" fill="rgba(45,212,191,0.12)" stroke="rgba(153,246,228,0.2)" stroke-width="1"/>
  <text x="210" y="107" text-anchor="middle" fill="#CCFBF1" font-family="'Be Vietnam Pro', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">TỰ LÀM HỒ SƠ KỲ THÁNG 3/2027</text>

  <defs>
    <linearGradient id="docBg" x1="4" y1="4" x2="76" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20E3B2"/>
      <stop offset="0.5" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="docBorder" x1="4" y1="4" x2="76" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#99F6E4"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="52" y1="4" x2="76" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
