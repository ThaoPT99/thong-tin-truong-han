<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Bản đồ vị trí các trường Hàn Quốc Visa D2-6</title>
  <desc id="desc">Bản đồ minh họa vị trí các trường theo khu vực Seoul, Gyeonggi, Incheon, Chungbuk, Gwangju, Jeonnam, Busan và Gyeongnam.</desc>
  <defs>
    <style>
      .bg { fill: #eef3f8; }
      .sea { fill: #dff0fb; }
      .land { fill: #ffffff; stroke: #b7c8d8; stroke-width: 3; }
      .province { fill: none; stroke: #dbe7f1; stroke-width: 2; stroke-dasharray: 8 8; }
      .region { fill: #64748b; font: 700 16px 'Be Vietnam Pro', Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #0f2f4f; font: 800 34px 'Be Vietnam Pro', Arial, sans-serif; }
      .subtitle { fill: #64748b; font: 500 16px 'Be Vietnam Pro', Arial, sans-serif; }
      .pin { fill: #0f766e; stroke: #ffffff; stroke-width: 4; }
      .pin2 { fill: #2563eb; stroke: #ffffff; stroke-width: 4; }
      .pin3 { fill: #f59e0b; stroke: #ffffff; stroke-width: 4; }
      .pinText { fill: #ffffff; font: 800 13px 'Be Vietnam Pro', Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #142033; font: 700 15px 'Be Vietnam Pro', Arial, sans-serif; }
      .labelSmall { fill: #64748b; font: 500 12px 'Be Vietnam Pro', Arial, sans-serif; }
      .leader { stroke: #94a3b8; stroke-width: 1.6; fill: none; }
      .card { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1.5; }
      .legendText { fill: #334155; font: 600 14px 'Be Vietnam Pro', Arial, sans-serif; }
      .note { fill: #64748b; font: 500 13px 'Be Vietnam Pro', Arial, sans-serif; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#142033" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="900" class="bg"/>
  <rect x="46" y="44" width="1108" height="812" rx="28" class="sea"/>
  <text x="84" y="104" class="title">Vị trí các trường Hàn Quốc</text>
  <text x="84" y="134" class="subtitle">Chương trình Visa D2-6 - bản đồ minh họa theo khu vực tuyển sinh</text>

  <g filter="url(#shadow)">
    <path class="land" d="M430 98
      C510 72 604 88 674 144
      C744 198 772 268 756 340
      C742 404 788 432 848 482
      C918 540 920 626 850 704
      C774 790 640 816 536 766
      C458 730 420 660 354 642
      C282 622 250 556 278 488
      C302 430 270 384 236 332
      C198 272 224 204 292 164
      C336 138 378 116 430 98Z"/>

    <path class="province" d="M286 250 C398 260 510 248 642 198"/>
    <path class="province" d="M282 394 C438 398 596 386 756 340"/>
    <path class="province" d="M340 548 C494 534 664 548 836 492"/>
    <path class="province" d="M482 704 C590 650 690 638 858 650"/>
  </g>

  <text x="264" y="206" class="region">Seoul / Incheon / Gyeonggi</text>
  <text x="500" y="350" class="region">Chungbuk</text>
  <text x="240" y="650" class="region">Gwangju</text>
  <text x="505" y="696" class="region">Jeonnam</text>
  <text x="735" y="630" class="region">Busan / Gyeongnam</text>

  <!-- Seoul, Incheon, Gyeonggi cluster -->
  <path class="leader" d="M328 214 L174 194"/>
  <circle cx="328" cy="214" r="14" class="pin2"/><text x="328" y="214" class="pinText">1</text>
  <text x="84" y="190" class="label">Sangmyung</text><text x="84" y="209" class="labelSmall">Seoul</text>

  <path class="leader" d="M350 224 L177 247"/>
  <circle cx="350" cy="224" r="14" class="pin2"/><text x="350" y="224" class="pinText">2</text>
  <text x="84" y="244" class="label">Induk</text><text x="84" y="263" class="labelSmall">Seoul</text>

  <path class="leader" d="M366 238 L179 300"/>
  <circle cx="366" cy="238" r="14" class="pin2"/><text x="366" y="238" class="pinText">3</text>
  <text x="84" y="298" class="label">DongDuk</text><text x="84" y="317" class="labelSmall">Seoul</text>

  <path class="leader" d="M286 246 L178 354"/>
  <circle cx="286" cy="246" r="14" class="pin"/><text x="286" y="246" class="pinText">4</text>
  <text x="84" y="352" class="label">KyungGin</text><text x="84" y="371" class="labelSmall">Incheon/Gyeonggi</text>

  <path class="leader" d="M344 284 L176 410"/>
  <circle cx="344" cy="284" r="14" class="pin"/><text x="344" y="284" class="pinText">5</text>
  <text x="84" y="408" class="label">YeonSung</text><text x="84" y="427" class="labelSmall">Anyang</text>

  <path class="leader" d="M370 322 L181 466"/>
  <circle cx="370" cy="322" r="14" class="pin"/><text x="370" y="322" class="pinText">6</text>
  <text x="84" y="464" class="label">Osan</text><text x="84" y="483" class="labelSmall">Osan/Gyeonggi</text>

  <path class="leader" d="M392 304 L620 252"/>
  <circle cx="392" cy="304" r="14" class="pin"/><text x="392" y="304" class="pinText">7</text>
  <text x="632" y="248" class="label">Dongnam</text><text x="632" y="267" class="labelSmall">Suwon/Gyeonggi</text>

  <!-- Chungbuk -->
  <path class="leader" d="M542 410 L702 388"/>
  <circle cx="542" cy="410" r="14" class="pin3"/><text x="542" y="410" class="pinText">8</text>
  <text x="714" y="384" class="label">Daewon</text><text x="714" y="403" class="labelSmall">Jecheon</text>

  <path class="leader" d="M570 438 L704 444"/>
  <circle cx="570" cy="438" r="14" class="pin3"/><text x="570" y="438" class="pinText">9</text>
  <text x="714" y="440" class="label">Sengmyung</text><text x="714" y="459" class="labelSmall">Jecheon</text>

  <!-- Gwangju / Jeonnam -->
  <path class="leader" d="M360 666 L174 652"/>
  <circle cx="360" cy="666" r="14" class="pin3"/><text x="360" y="666" class="pinText">10</text>
  <text x="84" y="648" class="label">Gwangju</text><text x="84" y="667" class="labelSmall">Gwangju</text>

  <path class="leader" d="M392 690 L176 712"/>
  <circle cx="392" cy="690" r="14" class="pin3"/><text x="392" y="690" class="pinText">11</text>
  <text x="84" y="708" class="label">Nambu</text><text x="84" y="727" class="labelSmall">Gwangju</text>

  <path class="leader" d="M560 720 L704 736"/>
  <circle cx="560" cy="720" r="14" class="pin3"/><text x="560" y="720" class="pinText">12</text>
  <text x="716" y="732" class="label">Suncheon Jeil</text><text x="716" y="751" class="labelSmall">Suncheon</text>

  <!-- Busan / Gyeongnam -->
  <path class="leader" d="M772 662 L954 560"/>
  <circle cx="772" cy="662" r="14" class="pin"/><text x="772" y="662" class="pinText">13</text>
  <text x="966" y="556" class="label">Dong-Eui</text><text x="966" y="575" class="labelSmall">Busan</text>

  <path class="leader" d="M802 646 L956 616"/>
  <circle cx="802" cy="646" r="14" class="pin"/><text x="802" y="646" class="pinText">14</text>
  <text x="966" y="612" class="label">Nữ Busan</text><text x="966" y="631" class="labelSmall">Busan</text>

  <path class="leader" d="M828 624 L956 672"/>
  <circle cx="828" cy="624" r="14" class="pin"/><text x="828" y="624" class="pinText">15</text>
  <text x="966" y="668" class="label">Busan Catholic</text><text x="966" y="687" class="labelSmall">Busan</text>

  <path class="leader" d="M762 704 L956 728"/>
  <circle cx="762" cy="704" r="14" class="pin"/><text x="762" y="704" class="pinText">16</text>
  <text x="966" y="724" class="label">Gimhae</text><text x="966" y="743" class="labelSmall">Gimhae</text>

  <g transform="translate(84 792)">
    <rect width="432" height="42" rx="12" class="card"/>
    <circle cx="22" cy="21" r="8" class="pin2"/>
    <text x="40" y="26" class="legendText">Seoul</text>
    <circle cx="132" cy="21" r="8" class="pin"/>
    <text x="150" y="26" class="legendText">Gyeonggi/Busan</text>
    <circle cx="308" cy="21" r="8" class="pin3"/>
    <text x="326" y="26" class="legendText">Tỉnh/thành khác</text>
  </g>
  <text x="620" y="822" class="note">Ghi chú: bản đồ minh họa theo khu vực, dùng để định hướng vị trí tương đối của các trường.</text>
</svg>
