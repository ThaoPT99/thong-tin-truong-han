<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Thông tin trường Hàn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-login-page">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <h1>Quản trị CMS</h1>
                <p>Thông tin trường Hàn — Visa D2-6</p>
            </div>
            <form id="login-form" class="admin-login-form">
                <div class="admin-field">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username" name="username" type="text" required autocomplete="username" placeholder="admin">
                </div>
                <div class="admin-field">
                    <label for="password">Mật khẩu</label>
                    <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••">
                </div>
                <div id="login-error" class="admin-error" hidden></div>
                <button type="submit" class="admin-btn admin-btn-primary admin-btn-full">Đăng nhập</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');
        const API = window.location.origin;  // Tự động: localhost:5000 hoặc domain deploy

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.hidden = true;
            const btn = form.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        password: form.password.value
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Đăng nhập thất bại';
                    errorDiv.hidden = false;
                    btn.disabled = false;
                    btn.textContent = 'Đăng nhập';
                    return;
                }

                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUser', JSON.stringify(data.user));
                window.location.href = '/admin/dashboard.html';

            } catch (err) {
                errorDiv.textContent = 'Không thể kết nối server. Kiểm tra lại backend.';
                errorDiv.hidden = false;
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>
</html>
